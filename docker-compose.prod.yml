name: trading-prod

x-logging: &production-logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-10}"

services:
  postgres:
    image: postgres:16-alpine
    container_name: trading-prod-postgres
    restart: unless-stopped
    logging: *production-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: trading-prod-redis
    restart: unless-stopped
    logging: *production-logging
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: trading-prod-backend
    restart: unless-stopped
    logging: *production-logging
    environment:
      ENVIRONMENT: production
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:?SECRET_ENCRYPTION_KEY is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      TESTNET_ADAPTERS_ENABLED: ${TESTNET_ADAPTERS_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  dependency-health-monitor:
    build:
      context: ./backend
    container_name: trading-prod-dependency-health-monitor
    restart: unless-stopped
    profiles:
      - monitoring
    logging: *production-logging
    command:
      - python
      - -m
      - app.workers.dependency_health_monitor
    environment:
      ENVIRONMENT: production
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:?SECRET_ENCRYPTION_KEY is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      TESTNET_ADAPTERS_ENABLED: ${TESTNET_ADAPTERS_ENABLED:-false}
      ALERT_TIMEOUT_SECONDS: ${ALERT_TIMEOUT_SECONDS:-5}
      TELEGRAM_ALERTS_ENABLED: ${TELEGRAM_ALERTS_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      EMAIL_ALERTS_ENABLED: ${EMAIL_ALERTS_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      WEBHOOK_ALERTS_ENABLED: ${WEBHOOK_ALERTS_ENABLED:-false}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_WEBHOOK_SECRET: ${ALERT_WEBHOOK_SECRET:-}
      DEPENDENCY_HEALTH_MONITOR_ENABLED: ${DEPENDENCY_HEALTH_MONITOR_ENABLED:-false}
      DEPENDENCY_HEALTH_MONITOR_INTERVAL_SECONDS: ${DEPENDENCY_HEALTH_MONITOR_INTERVAL_SECONDS:-60}
      DEPENDENCY_HEALTH_ALERT_THROTTLE_SECONDS: ${DEPENDENCY_HEALTH_ALERT_THROTTLE_SECONDS:-300}
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
    container_name: trading-prod-frontend
    restart: unless-stopped
    logging: *production-logging
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2.8-alpine
    container_name: trading-prod-caddy
    restart: unless-stopped
    logging: *production-logging
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?PUBLIC_DOMAIN is required}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:?CADDY_ACME_EMAIL is required}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

  postgres-backup:
    image: postgres:16-alpine
    container_name: trading-prod-postgres-backup
    profiles:
      - backup
    logging: *production-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ${POSTGRES_BACKUP_DIR:?POSTGRES_BACKUP_DIR is required}:/backups
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - >
        PGPASSWORD="$${POSTGRES_PASSWORD}" pg_dump
        --host postgres
        --port 5432
        --username "$${POSTGRES_USER}"
        --dbname "$${POSTGRES_DB}"
        --file "/backups/backup_$$(date +%Y%m%d).sql"
        --format plain
        --no-owner
        --no-privileges

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: trading-prod-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    logging: *production-logging
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: trading-prod-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    logging: *production-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required when monitoring is enabled}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
    name: trading-prod-postgres-data
  redis_data:
    name: trading-prod-redis-data
  caddy_data:
    name: trading-prod-caddy-data
  caddy_config:
    name: trading-prod-caddy-config
  prometheus_data:
    name: trading-prod-prometheus-data
  grafana_data:
    name: trading-prod-grafana-data
