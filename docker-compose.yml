services:
  postgres:
    image: postgres:16-alpine
    container_name: trading-dev-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_dev}
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trading-dev-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: trading-dev-backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-use-a-long-random-value}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:-change-me-use-a-32-byte-key}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://trading:trading@postgres:5432/trading_dev}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: trading-dev-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: trading-dev-postgres-data
  redis_data:
    name: trading-dev-redis-data
